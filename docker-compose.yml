services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: filemepls
    ports:
      - "5433:5432"
    volumes:
      - filemepls_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgres://postgres:secret@db:5432/filemepls?sslmode=disable
    ports:
      - "8080:8080"
    volumes:
      - filemepls_storage:/data/storage

volumes:
  filemepls_pgdata:
  filemepls_storage:
